<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
  <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
  <title>Архив выпусков — Центрально-азиатский журнал STEM</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .archive-search {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      padding: 16px;
      background: #f8fafc;
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .archive-search input[type="search"],
    .archive-search select {
      font-family: inherit;
      font-size: 14px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
    }
    .archive-search input[type="search"] {
      flex: 1 1 220px;
      min-width: 0;
    }
    .archive-search select { flex: 0 0 auto; min-width: 120px; }
    .archive-search-btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }
    .archive-search-btn:hover { background: var(--primary-light); }
    .archive-search-reset {
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    .search-results-header {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0 0 12px;
    }
    .search-result {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
    }
    .search-result:hover {
      border-color: var(--primary-light);
      box-shadow: 0 2px 10px rgba(12, 61, 130, 0.08);
      text-decoration: none;
    }
    .search-result-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 4px;
    }
    .search-result-authors {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .search-result-meta {
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
    }
    .archive-year-block { margin-bottom: 22px; }
    .archive-year-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--primary);
      margin: 0 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .archive-issue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }
    .archive-issue-link {
      display: block;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      transition: box-shadow .15s, border-color .15s;
    }
    .archive-issue-link:hover {
      border-color: var(--primary-light);
      box-shadow: 0 2px 10px rgba(12, 61, 130, 0.08);
      text-decoration: none;
    }
    .archive-issue-num {
      font-size: 16px;
      font-weight: 800;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .archive-issue-meta { font-size: 12px; color: var(--text-muted); }
    .hidden { display: none !important; }
  </style>
</head>
<body data-i18n-doc="archives">

<header class="site-header">
  <div class="header-top">
    <a href="/" class="header-logo" style="text-decoration:none;color:inherit;">
      <img src="/img/android-chrome-192x192.png" alt="KIUT" style="height:52px;width:auto;flex-shrink:0">
      <div class="logo-text">
        <h1 data-i18n="brand_title_main">Центрально-азиатский журнал STEM</h1>
        <p data-i18n="header_archive_sub">Архив выпусков</p>
      </div>
    </a>
    <div class="header-top-right">
      <div class="lang-switch lang-switch--inline" data-lang-switch role="group">
        <button type="button" class="lang-switch__btn" data-set-lang="uz">UZ</button>
        <button type="button" class="lang-switch__btn" data-set-lang="ru">RU</button>
        <button type="button" class="lang-switch__btn" data-set-lang="en">EN</button>
      </div>
      <div class="header-auth" id="header-auth"></div>
    </div>
  </div>
  <nav class="journal-nav">
    <span class="journal-nav-label" data-i18n="journal_nav_label">Раздел:</span>
    <a href="/#stem-current-issue" class="journal-btn"><span class="j-icon">📌</span> <span data-i18n="nav_current_issue">Текущий выпуск</span></a>
    <a href="/archives.html" class="journal-btn"><span class="j-icon">📚</span> <span data-i18n="nav_archive">Архив</span></a>
    <a href="/" class="journal-btn" data-i18n="nav_back_home">← На главную</a>
    <a href="/register.html" class="journal-btn"><span class="j-icon">✍️</span> <span data-i18n="nav_submit">Подать статью</span></a>
    <a href="/login.html" class="journal-btn"><span class="j-icon">👤</span> <span data-i18n="nav_cabinet">Личный кабинет</span></a>
  </nav>
</header>

<div class="main-content" style="max-width:820px;margin:0 auto">
  <div class="page-header" style="padding-top:4px;margin-bottom:12px">
    <h2 style="margin-bottom:6px" data-i18n="archives_h2">📚 Архив журнала STEM</h2>
    <p class="form-text" style="font-size:14px;line-height:1.45;color:var(--text-muted);margin:0" data-i18n="archives_desc">
      Поиск по названию и авторам или просмотр по годам.
    </p>
  </div>

  <form class="archive-search" id="archive-search-form" role="search">
    <input type="search" id="archive-q" name="q" data-i18n-placeholder="archives_search_ph" placeholder="Название или автор…" autocomplete="off" data-i18n-aria="archives_search_aria" aria-label="Поиск по названию или автору">
    <select id="archive-year" name="year" data-i18n-aria="archives_year_aria" aria-label="Год выпуска">
      <option value="" data-i18n="archives_year_all">Все годы</option>
    </select>
    <select id="archive-tom" name="tom" data-i18n-aria="archives_tom_aria" aria-label="Том">
      <option value="" data-i18n="archives_tom_all">Все тома</option>
    </select>
    <button type="submit" class="archive-search-btn" data-i18n="archives_search_btn">Найти</button>
    <button type="button" class="archive-search-reset" id="archive-reset" data-i18n="archives_reset_btn">Сбросить</button>
  </form>

  <div id="search-results-wrap" class="hidden">
    <p class="search-results-header" id="search-results-header"></p>
    <div id="search-results"></div>
  </div>

  <div id="archives-browse">
    <div id="archives-body">
      <div class="empty-state"><div class="loader loader-dark"></div></div>
    </div>
  </div>
</div>

<script src="/js/stem-locale-site.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/app.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    updateHeaderAuth();
    initArchivePage();
  });

  function esc(t) {
    const d = document.createElement('div');
    d.textContent = t == null ? '' : t;
    return d.innerHTML;
  }

  function artWord(n) {
    if (typeof KiutI18n === 'undefined') return 'статей';
    const L = KiutI18n.getLang();
    return KiutI18n.plural(L, n, {
      one: i18t('archive_art_one'),
      few: i18t('archive_art_few'),
      many: i18t('archive_art_many'),
      other: i18t('archive_art_many'),
    });
  }

  function resWord(n) {
    if (typeof KiutI18n === 'undefined') return 'результатов';
    const L = KiutI18n.getLang();
    return KiutI18n.plural(L, n, {
      one: i18t('archive_res_one'),
      few: i18t('archive_res_few'),
      many: i18t('archive_res_many'),
      other: i18t('archive_res_many'),
    });
  }

  function buildFileUrl(folder, fileName) {
    const parts = folder.split('/').map((p) => encodeURIComponent(p));
    return '/archives/' + parts.join('/') + '/' + encodeURIComponent(fileName);
  }

  function renderArchiveIssueLink(it) {
    const href = '/archive-issue.html?folder=' + encodeURIComponent(it.folder);
    const numLabel = it.num > 0 ? `№ ${it.num}` : (it.label || it.folder.split('/').pop());
    const sub = it.fileCount + ' ' + artWord(it.fileCount);
    return `
      <a href="${esc(href)}" class="archive-issue-link">
        <div class="archive-issue-num">${esc(numLabel)}</div>
        <div class="archive-issue-meta">${esc(sub)}</div>
      </a>`;
  }

  function renderYearGroup(group) {
    return `
      <section class="archive-year-block" aria-label="${esc(group.label)}">
        <h3 class="archive-year-title">${esc(group.label)}</h3>
        <div class="archive-issue-grid">
          ${group.issues.map(renderArchiveIssueLink).join('')}
        </div>
      </section>`;
  }

  function renderSearchResult(item) {
    const href = buildFileUrl(item.folder, item.file);
    const authors = (item.authors && item.authors.length) ? item.authors.join(', ') : '';
    return `
      <a href="${esc(href)}" target="_blank" rel="noopener noreferrer" class="search-result">
        <div class="search-result-title">${esc(item.title)}</div>
        ${authors ? `<div class="search-result-authors">${esc(authors)}</div>` : ''}
        <div class="search-result-meta">${esc(item.issueLabel)} · ${esc(item.ext.replace('.', '').toUpperCase())}</div>
      </a>`;
  }

  let searchTimer = null;
  let allGroups = [];

  function fillYearTomFilters(years, groups) {
    const yearSel = document.getElementById('archive-year');
    const tomSel = document.getElementById('archive-tom');
    yearSel.innerHTML = '<option value="">' + i18t('archives_year_all') + '</option>' +
      years.map((y) => `<option value="${y}">${y}</option>`).join('');

    const toms = new Set();
    groups.forEach((g) => { if (g.tom > 0) toms.add(g.tom); });
    tomSel.innerHTML = '<option value="">' + i18t('archives_tom_all') + '</option>' +
      [...toms].sort((a, b) => a - b).map((t) => `<option value="${t}">${i18t('archives_tom_opt', { n: t })}</option>`).join('');
  }

  function isSearchActive() {
    const q = document.getElementById('archive-q').value.trim();
    const year = document.getElementById('archive-year').value;
    const tom = document.getElementById('archive-tom').value;
    return !!(q || year || tom);
  }

  function runSearch() {
    const q = document.getElementById('archive-q').value.trim();
    const year = document.getElementById('archive-year').value;
    const tom = document.getElementById('archive-tom').value;
    const params = new URLSearchParams();
    if (q) params.set('q', q);
    if (year) params.set('year', year);
    if (tom) params.set('tom', tom);

    if (!q && !year && !tom) {
      document.getElementById('search-results-wrap').classList.add('hidden');
      document.getElementById('archives-browse').classList.remove('hidden');
      return;
    }

    fetch('/api/file-archive/search?' + params.toString())
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((data) => {
        const wrap = document.getElementById('search-results-wrap');
        const list = document.getElementById('search-results');
        const header = document.getElementById('search-results-header');
        const browse = document.getElementById('archives-browse');

        wrap.classList.remove('hidden');
        browse.classList.add('hidden');

        if (!data.results.length) {
          header.textContent = i18t('archives_nothing');
          list.innerHTML = '';
          return;
        }

        header.textContent = i18t('archives_found', { n: data.count, word: resWord(data.count) });
        list.innerHTML = data.results.map(renderSearchResult).join('');
      })
      .catch(() => {
        document.getElementById('search-results-header').textContent = i18t('archives_search_error');
        document.getElementById('search-results').innerHTML = '';
      });
  }

  function initArchivePage() {
    const form = document.getElementById('archive-search-form');
    const qInput = document.getElementById('archive-q');
    const resetBtn = document.getElementById('archive-reset');
    const body = document.getElementById('archives-body');

    fetch('/api/file-archive/issues')
      .then((r) => (r.ok ? r.json() : Promise.reject()))
      .then((filePayload) => {
        allGroups = filePayload.groups || [];
        const years = [...new Set(allGroups.map((g) => g.year).filter((y) => y > 0))].sort((a, b) => b - a);
        fillYearTomFilters(years, allGroups);

        if (!allGroups.length) {
          body.innerHTML = '<div class="card" style="padding:16px;color:var(--text-muted);font-size:14px">' + i18t('archives_empty') + '</div>';
          return;
        }
        body.innerHTML = allGroups.map(renderYearGroup).join('');
      })
      .catch(() => {
        body.innerHTML = '<div class="alert alert-danger">' + i18t('archives_load_error') + '</div>';
      });

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      runSearch();
    });

    qInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        if (isSearchActive()) runSearch();
        else {
          document.getElementById('search-results-wrap').classList.add('hidden');
          document.getElementById('archives-browse').classList.remove('hidden');
        }
      }, 350);
    });

    document.getElementById('archive-year').addEventListener('change', () => {
      if (isSearchActive()) runSearch();
    });
    document.getElementById('archive-tom').addEventListener('change', () => {
      if (isSearchActive()) runSearch();
    });

    resetBtn.addEventListener('click', () => {
      qInput.value = '';
      document.getElementById('archive-year').value = '';
      document.getElementById('archive-tom').value = '';
      document.getElementById('search-results-wrap').classList.add('hidden');
      document.getElementById('archives-browse').classList.remove('hidden');
    });

    const urlQ = new URLSearchParams(location.search).get('q');
    if (urlQ) {
      qInput.value = urlQ;
      runSearch();
    }
  }
</script>
</body>
</html>
