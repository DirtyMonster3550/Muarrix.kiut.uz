<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
 <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
 <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
 <title>Архив выпусков — Muarrix.kiut.uz</title>
 <link rel="stylesheet" href="/css/style.css">
 <style>
.archive-search {
 display: flex;
 flex-wrap: wrap;
 gap: 14px;
 margin-bottom: 28px;
 padding: 22px;
 background: #f8fafc;
 border: 1px solid var(--border);
 border-radius: 14px;
 }
.archive-search input[type="search"],
.archive-search select {
 font-family: inherit;
 font-size: 17px;
 padding: 14px 16px;
 border: 1px solid var(--border);
 border-radius: 10px;
 background: #fff;
 }
.archive-search input[type="search"] {
 flex: 1 1 280px;
 min-width: 0;
 }
.archive-search select { flex: 0 0 auto; min-width: 150px; }
.archive-search-btn {
 padding: 14px 24px;
 border: none;
 border-radius: 10px;
 background: var(--primary);
 color: #fff;
 font-weight: 700;
 font-size: 17px;
 cursor: pointer;
 }
.archive-search-btn:hover { background: var(--primary-light); }
.archive-search-reset {
 padding: 14px 20px;
 border: 1px solid var(--border);
 border-radius: 10px;
 background: #fff;
 font-size: 17px;
 cursor: pointer;
 }
.search-results-header {
 font-size: 17px;
 color: var(--text-muted);
 margin: 0 0 16px;
 }
.search-result {
 display: block;
 padding: 18px 20px;
 border: 1px solid var(--border);
 border-radius: 12px;
 margin-bottom: 12px;
 text-decoration: none;
 color: inherit;
 background: var(--surface);
 transition: border-color.15s, box-shadow.15s;
 }
.search-result:hover {
 border-color: var(--primary-light);
 box-shadow: 0 2px 10px rgba(12, 61, 130, 0.08);
 text-decoration: none;
 }
.search-result-title {
 font-size: 18px;
 font-weight: 700;
 color: var(--text);
 line-height: 1.4;
 margin-bottom: 6px;
 }
.search-result-authors {
 font-size: 16px;
 color: var(--text-muted);
 margin-bottom: 8px;
 }
.search-result-meta {
 font-size: 15px;
 color: var(--primary);
 font-weight: 600;
 }
.search-result-tags {
 display: flex;
 flex-wrap: wrap;
 gap: 6px;
 margin-top: 8px;
 }
.search-tag {
 font-size: 13px;
 padding: 4px 10px;
 border-radius: 999px;
 background: #eef2ff;
 color: #3730a3;
 font-weight: 600;
 }
.search-relevance {
 font-size: 13px;
 color: var(--text-muted);
 margin-top: 6px;
 }
.search-similar-wrap {
 margin-top: 10px;
 padding-top: 10px;
 border-top: 1px dashed var(--border);
 }
.search-similar-link {
 display: block;
 font-size: 14px;
 color: var(--primary);
 margin-top: 4px;
 text-decoration: none;
 }
.search-similar-link:hover { text-decoration: underline; }
.archive-page-header h2 {
 font-size: clamp(1.75rem, 3vw, 2.125rem);
 margin-bottom: 10px;
 }
.archive-page-header .archive-page-desc {
 font-size: 17px;
 line-height: 1.5;
 color: var(--text-muted);
 margin: 0;
 }
.archive-year-block { margin-bottom: 32px; }
.archive-year-title {
 font-size: 22px;
 font-weight: 800;
 color: var(--primary);
 margin: 0 0 16px;
 padding-bottom: 10px;
 border-bottom: 2px solid var(--border);
 }
.archive-issue-grid {
 display: grid;
 grid-template-columns: repeat(auto-fill, 240px);
 gap: 20px;
 justify-content: start;
}
.archive-issue-link {
 display: flex;
 flex-direction: column;
 width: 240px;
 max-width: 100%;
 padding: 0;
 overflow: hidden;
 border: 1px solid var(--border);
 border-radius: 14px;
 text-decoration: none;
 color: inherit;
 background: var(--surface);
 transition: box-shadow.15s, border-color.15s, transform.15s;
}
.archive-issue-link:hover {
 border-color: var(--primary-light);
 box-shadow: 0 4px 16px rgba(12, 61, 130, 0.12);
 transform: translateY(-2px);
 text-decoration: none;
 }
.archive-issue-cover {
 width: 100%;
 aspect-ratio: 2 / 3;
 height: auto;
 object-fit: contain;
 object-position: center top;
 display: block;
 background: #eef2f7;
 padding: 8px 6px 0;
 box-sizing: border-box;
}
.archive-issue-link-body {
 padding: 16px 18px 18px;
 }
.archive-issue-num {
 font-size: 22px;
 font-weight: 800;
 color: var(--primary);
 margin-bottom: 6px;
 }
.archive-issue-meta { font-size: 16px; color: var(--text-muted); }
.archives-page .journal-nav-label { font-size: 14px; }
.archives-page .journal-btn {
 font-size: 15px;
 padding: 10px 18px;
 border-radius: 10px;
 }
.archives-page .logo-text h1 { font-size: 22px; }
.archives-page .logo-text p { font-size: 15px; }
.hidden { display: none!important; }
 </style>
</head>
<body class="archives-page" data-i18n-doc="archives">

<header class="site-header">
 <div class="header-top">
 <a href="/" class="header-logo" style="text-decoration:none;color:inherit;">
 <img src="/img/android-chrome-192x192.png" alt="KIUT" style="height:52px;width:auto;flex-shrink:0">
 <div class="logo-text">
 <h1 data-i18n="brand_title_main">Muarrix.kiut.uz</h1>
 <p data-i18n="header_archive_sub">Архив выпусков</p>
 </div>
 </a>
 <div class="header-top-right">
 <div class="lang-switch lang-switch--inline" data-lang-switch role="group">
 <button type="button" class="lang-switch__btn" data-set-lang="uz">UZ</button>
 <button type="button" class="lang-switch__btn" data-set-lang="ru">RU</button>
 <button type="button" class="lang-switch__btn" data-set-lang="en">EN</button>
 </div>
 <div class="header-auth" id="header-auth"></div>
 </div>
 </div>
 <nav class="journal-nav">
 <span class="journal-nav-label" data-i18n="journal_nav_label">Раздел:</span>
 <a href="/#muarrix-current-issue" class="journal-btn"><span data-i18n="nav_current_issue">Текущий выпуск</span></a>
 <a href="/archives.html" class="journal-btn"><span data-i18n="nav_archive">Архив</span></a>
 <a href="/" class="journal-btn" data-i18n="nav_back_home">← На главную</a>
 <a href="/register.html" class="journal-btn"><span data-i18n="nav_submit">Подать статью</span></a>
 <a href="/login.html" class="journal-btn"><span data-i18n="nav_cabinet">Личный кабинет</span></a>
 </nav>
</header>

<div class="main-content" style="max-width:1120px;margin:0 auto;padding:0 20px 48px">
 <div class="page-header archive-page-header" style="padding-top:8px;margin-bottom:20px">
 <h2 data-i18n="archives_h2">Архив журнала Muarrix.kiut.uz</h2>
 <p class="archive-page-desc" data-i18n="archives_desc">
 Умный поиск по теме, названию и авторам — или просмотр по годам.
 </p>
 </div>

 <form class="archive-search" id="archive-search-form" role="search">
 <input type="search" id="archive-q" name="q" placeholder="Тема, название или автор…" autocomplete="off" aria-label="Умный поиск по архиву">
 <select id="archive-year" name="year" data-i18n-aria="archives_year_aria" aria-label="Год выпуска">
 <option value="" data-i18n="archives_year_all">Все годы</option>
 </select>
 <select id="archive-num" name="num" data-i18n-aria="archives_num_aria" aria-label="Номер выпуска">
 <option value="" data-i18n="archives_num_all">Все номера</option>
 </select>
 <button type="submit" class="archive-search-btn" data-i18n="archives_search_btn">Найти</button>
 <button type="button" class="archive-search-reset" id="archive-reset" data-i18n="archives_reset_btn">Сбросить</button>
 </form>

 <div id="search-results-wrap" class="hidden">
 <p class="search-results-header" id="search-results-header"></p>
 <div id="search-results"></div>
 </div>

 <div id="archives-browse">
 <div id="archives-body">
 <div class="empty-state"><div class="loader loader-dark"></div></div>
 </div>
 </div>
</div>

<script src="/js/muarrix-locale-site.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/app.js"></script>
<script>
 document.addEventListener('DOMContentLoaded', () => {
 updateHeaderAuth();
 initArchivePage();
 });

 function esc(t) {
 const d = document.createElement('div');
 d.textContent = t == null? '': t;
 return d.innerHTML;
 }

 function artWord(n) {
 if (typeof KiutI18n === 'undefined') return 'статей';
 const L = KiutI18n.getLang();
 return KiutI18n.plural(L, n, {
 one: i18t('archive_art_one'),
 few: i18t('archive_art_few'),
 many: i18t('archive_art_many'),
 other: i18t('archive_art_many'),
 });
 }

 function resWord(n) {
 if (typeof KiutI18n === 'undefined') return 'результатов';
 const L = KiutI18n.getLang();
 return KiutI18n.plural(L, n, {
 one: i18t('archive_res_one'),
 few: i18t('archive_res_few'),
 many: i18t('archive_res_many'),
 other: i18t('archive_res_many'),
 });
 }

 function buildFileUrl(folder, fileName) {
 const parts = folder.split('/').map((p) => encodeURIComponent(p));
 return '/archives/' + parts.join('/') + '/' + encodeURIComponent(fileName);
 }

 function renderArchiveIssueLink(it) {
 const href = '/archive-issue.html?folder=' + encodeURIComponent(it.folder);
 const numLabel = it.num > 0? `№ ${it.num}`: (it.label || it.folder.split('/').pop());
 const sub = it.fileCount + ' ' + artWord(it.fileCount);
 const cover = it.coverUrl || '/img/journal-cover.png';
 return `
 <a href="${esc(href)}" class="archive-issue-link">
 <img src="${esc(cover)}" alt="" class="archive-issue-cover" loading="lazy">
 <div class="archive-issue-link-body">
 <div class="archive-issue-num">${esc(numLabel)}</div>
 <div class="archive-issue-meta">${esc(sub)}</div>
 </div>
 </a>`;
 }

 function renderYearGroup(group) {
 return `
 <section class="archive-year-block" aria-label="${esc(group.label)}">
 <h3 class="archive-year-title">${esc(group.label)}</h3>
 <div class="archive-issue-grid">
 ${group.issues.map(renderArchiveIssueLink).join('')}
 </div>
 </section>`;
 }

 function renderSearchResult(item, index) {
 const href = buildFileUrl(item.folder, item.file);
 const authors = (item.authors && item.authors.length)? item.authors.join(', '): '';
 const tags = (item.tags || []).map((t) => `<span class="search-tag">${esc(t)}</span>`).join('');
 const rel = item.relevance > 0 ? `<div class="search-relevance">Релевантность: ${item.relevance}</div>` : '';
 const simId = `similar-${index}`;
 return `
 <div class="search-result" style="cursor:default">
 <a href="${esc(href)}" target="_blank" rel="noopener noreferrer" style="text-decoration:none;color:inherit">
 <div class="search-result-title">${esc(item.title)}</div>
 ${authors? `<div class="search-result-authors">${esc(authors)}</div>`: ''}
 <div class="search-result-meta">${esc(item.issueLabel)} · ${esc(item.ext.replace('.', '').toUpperCase())}</div>
 ${rel}
 ${tags ? `<div class="search-result-tags">${tags}</div>` : ''}
 </a>
 <div class="search-similar-wrap">
 <button type="button" class="archive-search-reset" style="padding:8px 12px;font-size:14px" data-folder="${esc(item.folder)}" data-file="${esc(item.file)}" data-target="${simId}" onclick="loadSimilarFromBtn(this)">Похожие статьи</button>
 <div id="${simId}"></div>
 </div>
 </div>`;
 }

 function loadSimilarFromBtn(btn) {
 loadSimilar(btn.dataset.folder, btn.dataset.file, btn.dataset.target);
 }

 async function loadSimilar(folder, file, targetId) {
 const box = document.getElementById(targetId);
 if (!box) return;
 box.innerHTML = '<span style="font-size:14px;color:var(--text-muted)">Ищем…</span>';
 try {
 const params = new URLSearchParams({ folder, file });
 const data = await fetch('/api/file-archive/similar?' + params.toString()).then((r) => r.json());
 if (!data.similar?.length) {
 box.innerHTML = '<span style="font-size:14px;color:var(--text-muted)">Похожих статей не найдено</span>';
 return;
 }
 box.innerHTML = data.similar.map((s) => {
 const href = buildFileUrl(s.folder, s.file);
 return `<a class="search-similar-link" href="${esc(href)}" target="_blank" rel="noopener">${esc(s.title)} (${s.similarity}% · ${esc(s.issueLabel)})</a>`;
 }).join('');
 } catch {
 box.innerHTML = '<span style="font-size:14px;color:#b91c1c">Ошибка загрузки</span>';
 }
 }

 let searchTimer = null;
 let allGroups = [];
 let archiveYears = [];
 let archiveIssuesFlat = [];

 function fillYearNumFilters(years, groups, issues) {
 const yearSel = document.getElementById('archive-year');
 const numSel = document.getElementById('archive-num');
 yearSel.innerHTML = '<option value="">' + i18t('archives_year_all') + '</option>' +
 years.map((y) => `<option value="${y}">${y}</option>`).join('');

 const nums = new Set();
 (issues || []).forEach((it) => { if (it.num > 0) nums.add(it.num); });
 groups.forEach((g) => { g.issues.forEach((it) => { if (it.num > 0) nums.add(it.num); }); });
 numSel.innerHTML = '<option value="">' + i18t('archives_num_all') + '</option>' +
 [...nums].sort((a, b) => a - b).map((n) => `<option value="${n}">${i18t('archives_num_opt', { n })}</option>`).join('');
 }

 function filterGroups(groups) {
 const year = document.getElementById('archive-year').value;
 const num = document.getElementById('archive-num').value;
 return groups.map((g) => ({
 ...g,
 issues: g.issues.filter((it) => {
 if (year && String(it.year) !== year) return false;
 if (num && String(it.num) !== num) return false;
 return true;
 }),
 })).filter((g) => g.issues.length > 0);
 }

 function renderBrowseGrid() {
 const body = document.getElementById('archives-body');
 const filtered = filterGroups(allGroups);
 if (!filtered.length) {
 body.innerHTML = '<div class="card" style="padding:20px;color:var(--text-muted);font-size:17px">' + i18t('archives_nothing') + '</div>';
 return;
 }
 body.innerHTML = filtered.map(renderYearGroup).join('');
 }

 function isSearchActive() {
 const q = document.getElementById('archive-q').value.trim();
 const year = document.getElementById('archive-year').value;
 const num = document.getElementById('archive-num').value;
 return!!(q || year || num);
 }

 function runSearch() {
 const q = document.getElementById('archive-q').value.trim();
 const year = document.getElementById('archive-year').value;
 const num = document.getElementById('archive-num').value;

 if (!q) {
 document.getElementById('search-results-wrap').classList.add('hidden');
 document.getElementById('archives-browse').classList.remove('hidden');
 renderBrowseGrid();
 return;
 }

 const params = new URLSearchParams();
 if (q) params.set('q', q);
 if (year) params.set('year', year);
 if (num) params.set('num', num);

 fetch('/api/file-archive/search?' + params.toString())
.then((r) => (r.ok? r.json(): Promise.reject()))
.then((data) => {
 const wrap = document.getElementById('search-results-wrap');
 const list = document.getElementById('search-results');
 const header = document.getElementById('search-results-header');
 const browse = document.getElementById('archives-browse');

 wrap.classList.remove('hidden');
 browse.classList.add('hidden');

 if (!data.results.length) {
 header.textContent = i18t('archives_nothing');
 list.innerHTML = '';
 return;
 }

 header.textContent = i18t('archives_found', { n: data.count, word: resWord(data.count) });
 list.innerHTML = data.results.map((item, i) => renderSearchResult(item, i)).join('');
 })
.catch(() => {
 document.getElementById('search-results-header').textContent = i18t('archives_search_error');
 document.getElementById('search-results').innerHTML = '';
 });
 }

 function initArchivePage() {
 const form = document.getElementById('archive-search-form');
 const qInput = document.getElementById('archive-q');
 const resetBtn = document.getElementById('archive-reset');
 const body = document.getElementById('archives-body');

 fetch('/api/file-archive/issues')
.then((r) => (r.ok? r.json(): Promise.reject()))
 .then((filePayload) => {
 allGroups = filePayload.groups || [];
 archiveYears = [...new Set(allGroups.map((g) => g.year).filter((y) => y > 0))].sort((a, b) => b - a);
 archiveIssuesFlat = filePayload.issues || [];
 fillYearNumFilters(archiveYears, allGroups, archiveIssuesFlat);

 if (!allGroups.length) {
 body.innerHTML = '<div class="card" style="padding:16px;color:var(--text-muted);font-size:14px">' + i18t('archives_empty') + '</div>';
 return;
 }
 renderBrowseGrid();
 })
.catch(() => {
 body.innerHTML = '<div class="alert alert-danger">' + i18t('archives_load_error') + '</div>';
 });

 form.addEventListener('submit', (e) => {
 e.preventDefault();
 runSearch();
 });

 qInput.addEventListener('input', () => {
 clearTimeout(searchTimer);
 searchTimer = setTimeout(() => {
 if (isSearchActive()) runSearch();
 else {
 document.getElementById('search-results-wrap').classList.add('hidden');
 document.getElementById('archives-browse').classList.remove('hidden');
 renderBrowseGrid();
 }
 }, 350);
 });

 document.getElementById('archive-year').addEventListener('change', runSearch);
 document.getElementById('archive-num').addEventListener('change', runSearch);

 resetBtn.addEventListener('click', () => {
 qInput.value = '';
 document.getElementById('archive-year').value = '';
 document.getElementById('archive-num').value = '';
 document.getElementById('search-results-wrap').classList.add('hidden');
 document.getElementById('archives-browse').classList.remove('hidden');
 renderBrowseGrid();
 });

 const urlQ = new URLSearchParams(location.search).get('q');
 if (urlQ) {
 qInput.value = urlQ;
 runSearch();
 }
 }

 function refreshArchiveLang() {
 const body = document.getElementById('archives-body');
 const yearSel = document.getElementById('archive-year');
 const numSel = document.getElementById('archive-num');
 if (!body || !yearSel || !numSel) return;

 const yearVal = yearSel.value;
 const numVal = numSel.value;

 if (archiveYears.length || allGroups.length) {
 fillYearNumFilters(archiveYears, allGroups, archiveIssuesFlat);
 yearSel.value = yearVal;
 numSel.value = numVal;
 }

 if (!allGroups.length) {
 if (body.querySelector('.card') || body.querySelector('.alert')) {
 body.innerHTML = '<div class="card" style="padding:16px;color:var(--text-muted);font-size:14px">' + i18t('archives_empty') + '</div>';
 }
 return;
 }

 const q = document.getElementById('archive-q').value.trim();
 if (q) runSearch();
 else {
 document.getElementById('search-results-wrap').classList.add('hidden');
 document.getElementById('archives-browse').classList.remove('hidden');
 renderBrowseGrid();
 }
 }

 document.addEventListener('kiut:langchange', refreshArchiveLang);
</script>
</body>
</html>
