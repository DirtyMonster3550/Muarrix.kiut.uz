<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
 <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
 <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
 <title>Статья — архив Muarrix.kiut.uz</title>
 <link rel="stylesheet" href="/css/style.css">
 <style>
.art-page { max-width: 1120px; margin: 0 auto; padding: 0 20px 56px; }
.art-breadcrumb {
 font-size: 13px;
 color: var(--text-muted);
 margin: 14px 0 22px;
 line-height: 1.65;
}
.art-breadcrumb a { color: var(--primary); text-decoration: none; }
.art-breadcrumb a:hover { text-decoration: underline; }
.art-layout {
 display: grid;
 grid-template-columns: minmax(0, 1fr) 300px;
 gap: 36px;
 align-items: start;
}
.art-main { min-width: 0; }
.art-title {
 font-size: clamp(1.35rem, 3.2vw, 1.85rem);
 font-weight: 800;
 color: var(--text);
 line-height: 1.35;
 margin: 0 0 18px;
 text-transform: uppercase;
 letter-spacing: 0.02em;
}
.art-authors-list {
 margin: 0 0 32px;
 padding: 0;
 list-style: none;
}
.art-authors-list li {
 font-size: 15px;
 color: var(--text);
 line-height: 1.7;
 margin-bottom: 4px;
}
.art-authors-list .role {
 color: var(--text-muted);
 font-weight: 500;
}
.art-block { margin-bottom: 28px; }
.art-block h2 {
 font-size: 13px;
 font-weight: 800;
 text-transform: uppercase;
 letter-spacing: 0.06em;
 color: var(--text);
 margin: 0 0 12px;
}
.art-block p {
 margin: 0;
 font-size: 15px;
 line-height: 1.75;
 color: var(--text);
 text-align: justify;
}
.art-block .empty { color: var(--text-muted); }
.art-keywords { display: flex; flex-wrap: wrap; gap: 8px; }
.art-keyword {
 font-size: 14px;
 color: var(--primary);
 font-weight: 600;
}
.art-keyword:not(:last-child)::after { content: ' ·'; color: var(--text-muted); font-weight: 400; }
.art-sidebar { position: sticky; top: 16px; }
.art-cover-card {
 background: #fff;
 border: 1px solid var(--border);
 border-radius: 10px;
 padding: 16px;
 text-align: center;
 margin-bottom: 16px;
 box-shadow: 0 2px 10px rgba(12, 61, 130, 0.06);
}
.art-cover-card img {
 width: 100%;
 max-width: 220px;
 height: auto;
 border-radius: 6px;
 box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.art-pdf-btn {
 display: flex;
 align-items: center;
 justify-content: center;
 gap: 10px;
 width: 100%;
 padding: 14px 18px;
 margin-bottom: 16px;
 border-radius: 8px;
 background: #7a1f35;
 color: #fff;
 font-size: 16px;
 font-weight: 800;
 text-decoration: none;
 letter-spacing: 0.04em;
 box-shadow: 0 4px 14px rgba(122, 31, 53, 0.35);
 transition: background 0.15s, transform 0.15s;
}
.art-pdf-btn:hover {
 background: #631828;
 color: #fff;
 transform: translateY(-1px);
}
.art-pdf-btn svg { flex-shrink: 0; }
.art-side-meta {
 background: #f3f4f6;
 border: 1px solid #e5e7eb;
 border-radius: 10px;
 padding: 18px 20px;
 font-size: 14px;
 line-height: 1.55;
 color: var(--text);
}
.art-side-meta > div + div { margin-top: 16px; padding-top: 16px; border-top: 1px solid #e5e7eb; }
.art-side-meta strong {
 display: block;
 font-size: 12px;
 font-weight: 800;
 text-transform: uppercase;
 letter-spacing: 0.04em;
 color: var(--text-muted);
 margin-bottom: 4px;
}
.art-side-meta a { color: var(--primary); font-weight: 600; text-decoration: none; }
.art-side-meta a:hover { text-decoration: underline; }
@media (max-width: 900px) {
 .art-layout { grid-template-columns: 1fr; }
 .art-sidebar { position: static; order: -1; max-width: 280px; margin: 0 auto 8px; }
}
 </style>
</head>
<body data-i18n-doc="archive_article">

<header class="site-header">
 <div class="header-top">
 <a href="/" class="header-logo" style="text-decoration:none;color:inherit;">
 <img src="/img/android-chrome-192x192.png" alt="KIUT" style="height:52px;width:auto;flex-shrink:0">
 <div class="logo-text">
 <h1 data-i18n="brand_title_main">Muarrix.kiut.uz</h1>
 <p data-i18n="header_archive_journal">Архив журнала Muarrix.kiut.uz</p>
 </div>
 </a>
 <div class="header-top-right">
 <div class="lang-switch lang-switch--inline" data-lang-switch role="group">
 <button type="button" class="lang-switch__btn" data-set-lang="uz">UZ</button>
 <button type="button" class="lang-switch__btn" data-set-lang="ru">RU</button>
 <button type="button" class="lang-switch__btn" data-set-lang="en">EN</button>
 </div>
 <div class="header-auth" id="header-auth"></div>
 </div>
 </div>
 <nav class="journal-nav">
 <span class="journal-nav-label" data-i18n="journal_nav_label">Раздел:</span>
 <a href="/archives.html" class="journal-btn"><span data-i18n="nav_all_issues">← Все выпуски</span></a>
 <a href="/" class="journal-btn" data-i18n="nav_home">Главная</a>
 <a href="/register.html" class="journal-btn"><span data-i18n="nav_submit">Подать статью</span></a>
 </nav>
</header>

<div class="main-content art-page">
 <div class="art-breadcrumb" id="breadcrumb">…</div>
 <div id="article-body"><div class="empty-state"><div class="loader loader-dark"></div></div></div>
</div>

<script src="/js/muarrix-locale-site.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
 if (typeof updateHeaderAuth === 'function') updateHeaderAuth();
});

var PDF_ICON = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6z" stroke="currentColor" stroke-width="1.8"/><path d="M14 2v6h6M8 13h8M8 17h8M8 9h2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';

function esc(t) {
 var d = document.createElement('div');
 d.textContent = t == null ? '' : t;
 return d.innerHTML;
}

function formatDate(iso) {
 if (!iso) return '—';
 try {
 var d = new Date(iso);
 if (Number.isNaN(d.getTime())) return String(iso).slice(0, 10);
 return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' });
 } catch (e) {
 return String(iso).slice(0, 10);
 }
}

var params = new URLSearchParams(location.search);
var folder = params.get('folder');
var file = params.get('file');
if (!folder || !file) {
 document.getElementById('article-body').innerHTML = '<div class="alert alert-danger">Не указаны параметры folder и file.</div>';
} else {

var articlePayload = null;

function issueHref(f) {
 return '/archive-issue.html?folder=' + encodeURIComponent(f);
}

function setPageTitle() {
 if (!articlePayload) return;
 document.title = i18t('title_archive_article_fmt', { title: articlePayload.title || file });
}

function renderBreadcrumb() {
 if (!articlePayload) return;
 var issueLabel = (articlePayload.issue && articlePayload.issue.title) || folder.split('/').pop();
 var html = '<a href="/">' + esc(i18t('nav_home')) + '</a> › '
 + '<a href="/archives.html">' + esc(i18t('nav_archive')) + '</a> › '
 + '<a href="' + esc(issueHref(folder)) + '">' + esc(issueLabel) + '</a> › '
 + '<span>' + esc(i18t('art_section_articles')) + '</span>';
 document.getElementById('breadcrumb').innerHTML = html;
}

function renderAuthorsList(authors) {
 if (!authors || !authors.length) {
 return '<ul class="art-authors-list"><li class="empty">—</li></ul>';
 }
 return '<ul class="art-authors-list">' + authors.map(function (name) {
 return '<li>' + esc(name) + ' <span class="role">(' + esc(i18t('art_author_role')) + ')</span></li>';
 }).join('') + '</ul>';
}

function renderKeywords(keywords) {
 if (!keywords || !keywords.length) {
 return '<p class="empty">—</p>';
 }
 return '<div class="art-keywords">' + keywords.map(function (kw) {
 return '<span class="art-keyword">' + esc(kw) + '</span>';
 }).join('') + '</div>';
}

function renderArticle() {
 if (!articlePayload) return;
 setPageTitle();
 renderBreadcrumb();

 var a = articlePayload;
 var cover = (a.issue && a.issue.coverUrl) || '/img/journal-cover.png';
 var issueTitle = (a.issue && a.issue.title) ? a.issue.title : folder.split('/').pop();
 var body = document.getElementById('article-body');
 var btnLabel = (a.ext === '.pdf') ? 'PDF' : (a.ext || '.pdf').replace('.', '').toUpperCase();

 var html = '<div class="art-layout">';
 html += '<div class="art-main">';
 html += '<h1 class="art-title">' + esc(a.title) + '</h1>';
 html += renderAuthorsList(a.authors);
 html += '<section class="art-block"><h2>' + i18t('art_keywords') + '</h2>' + renderKeywords(a.keywords) + '</section>';
 html += '<section class="art-block"><h2>' + i18t('art_abstract') + '</h2>';
 html += a.abstract ? '<p>' + esc(a.abstract) + '</p>' : '<p class="empty">' + i18t('art_no_abstract') + '</p>';
 html += '</section></div>';

 html += '<aside class="art-sidebar">';
 html += '<div class="art-cover-card"><img src="' + esc(cover) + '" alt=""></div>';
 html += '<a class="art-pdf-btn" href="' + esc(a.downloadUrl) + '" target="_blank" rel="noopener" download>'
 + PDF_ICON + ' ' + esc(btnLabel) + '</a>';
 html += '<div class="art-side-meta">';
 html += '<div><strong>' + i18t('art_meta_published') + '</strong>' + esc(formatDate(a.publishedAt)) + '</div>';
 html += '<div><strong>' + i18t('art_meta_issue') + '</strong><a href="' + esc(issueHref(folder)) + '">' + esc(issueTitle) + '</a></div>';
 html += '<div><strong>' + i18t('art_meta_section') + '</strong>' + esc(i18t('art_section_articles')) + '</div>';
 if (a.doi) {
 html += '<div><strong>DOI</strong><a href="https://doi.org/' + esc(a.doi.replace(/^https?:\/\/(dx\.)?doi\.org\//i, '')) + '" target="_blank" rel="noopener">' + esc(a.doi) + '</a></div>';
 }
 html += '</div></aside></div>';
 body.innerHTML = html;
}

fetch('/api/file-archive/article?folder=' + encodeURIComponent(folder) + '&file=' + encodeURIComponent(file))
 .then(function (r) { if (!r.ok) throw new Error('not found'); return r.json(); })
 .then(function (data) {
 articlePayload = data;
 renderArticle();
 })
 .catch(function () {
 document.getElementById('article-body').innerHTML =
 '<div class="alert alert-danger">' + i18t('art_load_error') + '</div>';
 });

document.addEventListener('kiut:langchange', function () {
 renderArticle();
});
}
</script>
</body>
</html>
