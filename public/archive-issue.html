<!DOCTYPE html>
<html lang="ru">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32x32.png">
 <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon-16x16.png">
 <link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
 <title>Выпуск — архив Muarrix.kiut.uz</title>
 <link rel="stylesheet" href="/css/style.css">
 <style>
.issue-hero {
 background: linear-gradient(135deg, #0c3d82, #1359b8);
 border-radius: 12px;
 padding: 28px 28px 24px;
 color: #fff;
 margin-bottom: 28px;
 display: flex;
 gap: 24px;
 align-items: flex-start;
 flex-wrap: wrap;
 }
.issue-hero-cover {
 width: 110px;
 height: 150px;
 object-fit: cover;
 border-radius: 8px;
 border: 2px solid rgba(255,255,255,0.35);
 box-shadow: 0 8px 24px rgba(0,0,0,0.25);
 flex-shrink: 0;
 background: rgba(255,255,255,0.08);
 }
.issue-hero-info { flex: 1; min-width: 0; }
.issue-hero-info h1 { font-size: clamp(1.05rem, 3vw, 1.35rem); font-weight: 800; margin: 0 0 8px; line-height: 1.3; }
.issue-hero-info.meta { font-size: 13px; opacity:.75; line-height: 1.6; }
.article-item {
 display: flex;
 align-items: flex-start;
 gap: 14px;
 padding: 16px 18px;
 border-bottom: 1px solid var(--border);
 text-decoration: none;
 color: inherit;
 transition: background.15s;
 }
.article-item:last-child { border-bottom: none; }
.article-item:hover { background: #f0f5ff; }
.article-num {
 flex-shrink: 0;
 width: 28px;
 height: 28px;
 border-radius: 50%;
 background: #e8f0fe;
 color: #0c3d82;
 font-size: 12px;
 font-weight: 700;
 display: flex;
 align-items: center;
 justify-content: center;
 margin-top: 2px;
 }
.article-body { flex: 1; min-width: 0; }
.article-title {
 display: block;
 font-size: 15px;
 font-weight: 700;
 color: var(--text);
 line-height: 1.4;
 word-break: break-word;
 text-transform: none;
 }
.article-authors {
 display: block;
 margin-top: 5px;
 font-size: 13px;
 font-weight: 500;
 color: var(--text-muted);
 line-height: 1.45;
 word-break: break-word;
 }
.article-actions {
 flex-shrink: 0;
 display: flex;
 flex-direction: column;
 align-items: flex-end;
 gap: 6px;
 margin-top: 2px;
 }
.article-ext { font-size: 11px; padding: 2px 7px; border-radius: 4px; background: #e8f0fe; color: #0c3d82; font-weight: 700; text-transform: uppercase; }
.article-open { font-size: 12px; color: var(--primary); font-weight: 700; white-space: nowrap; }
 </style>
</head>
<body data-i18n-doc="archive_issue">

<header class="site-header">
 <div class="header-top">
 <a href="/" class="header-logo" style="text-decoration:none;color:inherit;">
 <img src="/img/android-chrome-192x192.png" alt="KIUT" style="height:52px;width:auto;flex-shrink:0">
 <div class="logo-text">
 <h1 data-i18n="brand_title_main">Muarrix.kiut.uz</h1>
 <p id="header-subtitle" data-i18n="header_archive_journal">Архив журнала Muarrix.kiut.uz</p>
 </div>
 </a>
 <div class="header-top-right">
 <div class="lang-switch lang-switch--inline" data-lang-switch role="group">
 <button type="button" class="lang-switch__btn" data-set-lang="uz">UZ</button>
 <button type="button" class="lang-switch__btn" data-set-lang="ru">RU</button>
 <button type="button" class="lang-switch__btn" data-set-lang="en">EN</button>
 </div>
 <div class="header-auth" id="header-auth"></div>
 </div>
 </div>
 <nav class="journal-nav">
 <span class="journal-nav-label" data-i18n="journal_nav_label">Раздел:</span>
 <a href="/archives.html" class="journal-btn"><span data-i18n="nav_all_issues">← Все выпуски</span></a>
 <a href="/" class="journal-btn" data-i18n="nav_home">На главную</a>
 <a href="/register.html" class="journal-btn"><span data-i18n="nav_submit">Подать статью</span></a>
 </nav>
</header>

<div class="main-content" style="max-width:860px;margin:0 auto;padding-bottom:56px">

 <div style="font-size:13px;color:var(--text-muted);margin:8px 0 18px">
 <a href="/" data-i18n="nav_home">Главная</a> › <a href="/archives.html" data-i18n="nav_archive">Архив</a> › <span id="crumb-folder">…</span>
 </div>

 <div id="hero-block"></div>
 <div id="issue-body"><div class="empty-state"><div class="loader loader-dark"></div></div></div>

</div>

<script src="/js/muarrix-locale-site.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/app.js"></script>
<script>
 document.addEventListener('DOMContentLoaded', function () {
 if (typeof updateHeaderAuth === 'function') updateHeaderAuth();
 });

 function esc(t) {
 var d = document.createElement('div');
 d.textContent = t == null? '': t;
 return d.innerHTML;
 }

 function formatAuthors(authors) {
 if (!authors ||!authors.length) return '';
 return authors.join(', ');
 }

 function buildArticleUrl(folder, fileName) {
 return '/article.html?folder=' + encodeURIComponent(folder) + '&file=' + encodeURIComponent(fileName);
 }

 var params = new URLSearchParams(location.search);
 var folder = params.get('folder');
 if (!folder) { window.location.replace('/archives.html'); throw new Error(); }

 var folderLabel = folder.split('/').pop() || folder;
 var issuePayload = null;

 function fileWord(n) {
 if (typeof KiutI18n === 'undefined') return 'материалов';
 var L = KiutI18n.getLang();
 return KiutI18n.plural(L, n, {
 one: i18t('archive_file_one'),
 few: i18t('archive_file_few'),
 many: i18t('archive_file_many'),
 other: i18t('archive_file_many'),
 });
 }

 function setIssueTitle() {
 document.title = i18t('title_archive_issue_fmt', { folder: folderLabel });
 }

 function renderIssuePage() {
 setIssueTitle();
 document.getElementById('crumb-folder').textContent = folderLabel;

 if (!issuePayload) {
 var errBody = document.getElementById('issue-body');
 if (errBody && errBody.querySelector('.alert-danger')) {
 errBody.innerHTML = '<div class="alert alert-danger">' + i18t('archives_load_error') + '</div>';
 }
 return;
 }

 var data = issuePayload;
 var coverUrl = data.coverUrl || '/img/journal-cover.png';
 var heroHtml = '<div class="issue-hero">';
 heroHtml += '<img class="issue-hero-cover" src="' + esc(coverUrl) + '" alt="">';
 heroHtml += '<div class="issue-hero-info">';
 heroHtml += '<h1>' + esc(folderLabel) + '</h1>';
 heroHtml += '<div class="meta">' + i18t('archive_issue_meta') + '</div>';
 heroHtml += '</div>';
 heroHtml += '</div>';
 document.getElementById('hero-block').innerHTML = heroHtml;

 var files = data.files || [];
 var body = document.getElementById('issue-body');

 if (!files.length) {
 body.innerHTML = '<div class="card" style="padding:20px;color:var(--text-muted)">' + i18t('archive_no_articles') + '</div>';
 return;
 }

 var html = '<p style="font-size:14px;color:var(--text-muted);margin:0 0 12px"><strong>' + files.length + '</strong> '
 + fileWord(files.length) + ' ' + i18t('archive_issue_files_in') + '</p>';
 html += '<div class="card" style="padding:0;overflow:hidden">';
 files.forEach(function (f, i) {
 var href = buildArticleUrl(folder, f.name);
 var ext = f.ext.replace('.', '').toUpperCase();
 var title = f.title || f.name;
 var authorsLine = formatAuthors(f.authors);
 html += '<a href="' + esc(href) + '" class="article-item">'
 + '<span class="article-num">' + (i + 1) + '</span>'
 + '<div class="article-body">'
 + '<div class="article-title">' + esc(title) + '</div>'
 + (authorsLine? '<div class="article-authors">' + esc(authorsLine) + '</div>': '')
 + '</div>'
 + '<div class="article-actions">'
 + '<span class="article-ext">' + esc(ext) + '</span>'
 + '<span class="article-open">' + i18t('archive_view_article') + '</span>'
 + '</div>'
 + '</a>';
 });
 html += '</div>';
 body.innerHTML = html;
 }

 setIssueTitle();
 document.getElementById('crumb-folder').textContent = folderLabel;

 document.getElementById('hero-block').innerHTML =
 '<div class="issue-hero"><div class="empty-state"><div class="loader"></div></div></div>';

 fetch('/api/file-archive/issue?folder=' + encodeURIComponent(folder))
.then(function (r) { if (!r.ok) throw new Error('not found'); return r.json(); })
.then(function (data) {
 issuePayload = data;
 renderIssuePage();
 })
.catch(function () {
 document.getElementById('issue-body').innerHTML =
 '<div class="alert alert-danger">' + i18t('archives_load_error') + '</div>';
 });

 document.addEventListener('kiut:langchange', renderIssuePage);
</script>
</body>
</html>
