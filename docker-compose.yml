services:
  muarrix:
    image: registry.kiut.uz/kiut-developers/kiut-marrix:${IMAGE_TAG:-latest}
    container_name: muarrix
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/muarrix.db
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./public/archives:/app/public/archives
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
