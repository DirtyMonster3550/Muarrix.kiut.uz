# Пример для админа сервера KIUT — muarrix.kiut.uz
# Скопировать в sites-enabled и: nginx -t && systemctl reload nginx
#
# Важно: client_max_body_size 50m; — иначе обложки и PDF не загружаются (обрыв ~64 КБ)

server {
    listen 80;
    server_name muarrix.kiut.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name muarrix.kiut.uz;

    ssl_certificate     /cert/Certificate.crt;
    ssl_certificate_key /cert/Certificate.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
