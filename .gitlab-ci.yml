# CI/CD pipeline for muarrix.kiut.uz
# Required GitLab CI/CD variables (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY   – private key for deploy user (type: Variable)
#   SSH_HOST          – server IP or hostname
#   SSH_USER          – e.g. deploy
#   SSH_PORT          – optional, default 22
#   ADMIN_EMAIL       – admin login email (e.g. dr.admin35@gmail.com)
#   ADMIN_PASSWORD    – admin password (type: Variable, Mask variable: ON)
#
# Auto-provided by GitLab:
#   CI_REGISTRY, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD, CI_REGISTRY_IMAGE

stages:
  - check
  - build
  - scan
  - deploy

variables:
  DOCKER_TLS_CERTDIR: ""
  DOCKER_BUILDKIT: "1"
  DEPLOY_PATH: /home/developers/kiut-marrix/

# ==============================================================================
# CHECK — npm audit (har commit da)
# ==============================================================================
audit:
  stage: check
  image: node:24-alpine
  timeout: 10m
  cache:
    key: npm-${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
    policy: pull-push
  before_script:
    - npm ci --cache .npm --prefer-offline
  script:
    - npm audit --audit-level=high
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_MERGE_REQUEST_ID
  allow_failure: true

# ==============================================================================
# BUILD — Docker image → registry.kiut.uz (faqat main)
# ==============================================================================
build:
  stage: build
  image: docker:29.1.5-cli
  timeout: 20m
  services:
    - docker:29.1.5-dind
  needs: [audit]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $CI_REGISTRY_IMAGE:latest || true
    - |
      docker build \
        --build-arg BUILDKIT_INLINE_CACHE=1 \
        --cache-from $CI_REGISTRY_IMAGE:latest \
        -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA \
        -t $CI_REGISTRY_IMAGE:latest \
        .
    - docker push --all-tags $CI_REGISTRY_IMAGE
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  tags:
    - prod

# ==============================================================================
# SCAN — Trivy xavfsizlik tekshiruvi
# ==============================================================================
scan:
  stage: scan
  image: docker:29.1.5-cli
  timeout: 10m
  services:
    - docker:29.1.5-dind
  needs: [build]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL --no-progress $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  tags:
    - prod
  allow_failure: true

# ==============================================================================
# DEPLOY — SSH → docker compose pull + up (faqat main)
# ==============================================================================
deploy:
  stage: deploy
  image: alpine:3.21
  timeout: 10m
  needs: [build, scan]
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ADMIN_EMAIL_B64=""
      ADMIN_PASSWORD_B64=""
      if [ -n "$ADMIN_EMAIL" ] && [ -n "$ADMIN_PASSWORD" ]; then
        ADMIN_EMAIL_B64=$(printf '%s' "$ADMIN_EMAIL" | base64 | tr -d '\n')
        ADMIN_PASSWORD_B64=$(printf '%s' "$ADMIN_PASSWORD" | base64 | tr -d '\n')
        echo "ADMIN_EMAIL/ADMIN_PASSWORD заданы — назначим админа после deploy"
      else
        echo "ADMIN_EMAIL/ADMIN_PASSWORD не заданы в CI Variables — .env на сервере не трогаем"
      fi
      ssh -p ${SSH_PORT:-22} $SSH_USER@$SSH_HOST "
        set -e
        cd $DEPLOY_PATH
        echo '$CI_REGISTRY_PASSWORD' | docker login -u '$CI_REGISTRY_USER' --password-stdin $CI_REGISTRY
        IMAGE_TAG=$CI_COMMIT_SHORT_SHA docker compose pull
        IMAGE_TAG=$CI_COMMIT_SHORT_SHA docker compose up -d --remove-orphans
        if [ -n '$ADMIN_EMAIL_B64' ] && [ -n '$ADMIN_PASSWORD_B64' ]; then
          EMAIL=\$(printf '%s' '$ADMIN_EMAIL_B64' | base64 -d)
          PASS=\$(printf '%s' '$ADMIN_PASSWORD_B64' | base64 -d)
          sleep 5
          IMAGE_TAG=$CI_COMMIT_SHORT_SHA docker compose exec -T \
            -e \"ADMIN_EMAIL=\$EMAIL\" \
            -e \"ADMIN_PASSWORD=\$PASS\" \
            muarrix node scripts/ensure-admin.js
          echo 'Админ назначен через ensure-admin.js'
        fi
        docker image prune -f
      "
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
  environment:
    name: production
    url: https://marrix.kiut.uz
  tags:
    - prod
